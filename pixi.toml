[workspace]
authors = ["ymy6661 <ymy6661@outlook.com>"]
channels = ["conda-forge"]
name = "math-test"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
default = "sh -c '(sleep 1; open -a \"Google Chrome\" http://127.0.0.1:8000 >/dev/null 2>&1) & python -m uvicorn app:app --reload --host 127.0.0.1 --port 8000'"
dev = "sh -c '(sleep 1; open -a \"Google Chrome\" http://127.0.0.1:8000 >/dev/null 2>&1) & python -m uvicorn app:app --reload --host 127.0.0.1 --port 8000'"
serve = "python -m uvicorn app:app --reload --host 127.0.0.1 --port 8000"

[dependencies]
fastapi = ">=0.136.1,<0.137"
uvicorn = ">=0.46.0,<0.47"
jinja2 = ">=3.1.6,<4"
python-dotenv = ">=1.2.2,<2"
openai = ">=2.34.0,<3"
